<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Probe · Cash in Flash</title>
  <style>
    body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
      background:#0f172a; color:#e2e8f0; padding:18px; line-height:1.5; }
    h1 { font-size:1.1rem; margin:0 0 4px; color:#fff; }
    p { font-size:.85rem; color:#94a3b8; margin:0 0 14px; }
    button { font:inherit; font-weight:700; border:none; border-radius:10px; padding:12px 18px;
      cursor:pointer; background:#16a34a; color:#fff; }
    button:disabled { opacity:.5; }
    pre { background:#020617; border:1px solid #1e293b; border-radius:10px; padding:14px;
      font-size:12px; white-space:pre-wrap; word-break:break-word; overflow:auto; max-height:62vh; margin:14px 0; }
    .row { display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
    .ok { color:#4ade80; } .err { color:#f87171; }
  </style>
</head>
<body>
  <h1>Funding + payment-plan probe</h1>
  <p>Read-only diagnostic for the loan on the account you're signed into. Tap Copy and send it over.</p>
  <div class="row">
    <button id="run">Run probe</button>
    <button id="copy" disabled>Copy result</button>
    <span id="status"></span>
  </div>
  <pre id="out">Tap "Run probe".</pre>
  <script>
    var out = document.getElementById('out');
    var copyBtn = document.getElementById('copy');
    var statusEl = document.getElementById('status');
    var lastText = '';
    function run() {
      var t = null;
      try { t = sessionStorage.getItem('cif_id_token'); } catch (e) {}
      if (!t) { out.textContent = 'Not signed in. Open /login.html, sign into the test account, then come back here.'; return; }
      statusEl.textContent = 'Running…';
      fetch('/api/my-loans/active?debug=signing', { headers: { Authorization: 'Bearer ' + t, Accept: 'application/json' } })
        .then(function (r) { return r.json(); })
        .then(function (d) {
          var dbg = d && d.debug ? d.debug : d;
          var picked = {
            fundingProbe: dbg && dbg.fundingProbe,
            paymentPlanProbe: dbg && dbg.paymentPlanProbe,
            disbursementDocs: dbg && dbg.disbursementProbe,
            outstandingHeader: dbg && dbg.disbursementProbe && dbg.disbursementProbe.outstandingHeaderScrubbed
          };
          lastText = JSON.stringify(picked, null, 2);
          out.textContent = lastText;
          copyBtn.disabled = false;
          statusEl.innerHTML = '<span class="ok">Done — tap Copy.</span>';
        })
        .catch(function (e) {
          out.textContent = 'Error: ' + (e && e.message || e);
          statusEl.innerHTML = '<span class="err">Failed.</span>';
        });
    }
    document.getElementById('run').addEventListener('click', run);
    copyBtn.addEventListener('click', function () {
      var done = function () { statusEl.innerHTML = '<span class="ok">Copied!</span>'; };
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(lastText).then(done, function () {
          var r = document.createRange(); r.selectNode(out);
          window.getSelection().removeAllRanges(); window.getSelection().addRange(r);
          statusEl.textContent = 'Select-all + copy the text above.';
        });
      } else {
        var r = document.createRange(); r.selectNode(out);
        window.getSelection().removeAllRanges(); window.getSelection().addRange(r);
        statusEl.textContent = 'Select-all + copy the text above.';
      }
    });
    run();  // auto-run on load
  </script>
</body>
</html>
