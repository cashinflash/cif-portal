<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 380" fill="none" role="img" aria-label="Smartphone showing Cash in Flash approved, beside a bundle of cash and gold coins">
  <defs>
    <linearGradient id="cifPhone" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#21a957"/>
      <stop offset="1" stop-color="#0c7a39"/>
    </linearGradient>
    <linearGradient id="cifBill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5cc77f"/>
      <stop offset="1" stop-color="#34a35d"/>
    </linearGradient>
    <linearGradient id="cifCoin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffd24a"/>
      <stop offset="1" stop-color="#f0a91e"/>
    </linearGradient>
  </defs>

  <!-- ground shadow -->
  <ellipse cx="300" cy="338" rx="200" ry="24" fill="#0E8741" opacity=".08"/>

  <!-- speed / motion lines -->
  <g stroke="#3fc671" stroke-width="7" stroke-linecap="round">
    <line x1="34" y1="150" x2="150" y2="150" opacity=".5"/>
    <line x1="18" y1="190" x2="140" y2="190" opacity=".85"/>
    <line x1="44" y1="230" x2="152" y2="230" opacity=".45"/>
  </g>

  <!-- lightning bolt + sparkles -->
  <path d="M392 36 l-34 50 21 4 -28 44 56 -58 -22 -4 27 -36z" fill="#16c85c"/>
  <g fill="#19a94f">
    <path d="M440 92 l5.5 14 14 5.5 -14 5.5 -5.5 14 -5.5 -14 -14 -5.5 14 -5.5z"/>
    <path d="M462 150 l3.5 9 9 3.5 -9 3.5 -3.5 9 -3.5 -9 -9 -3.5 9 -3.5z"/>
  </g>

  <!-- ===== Phone ===== -->
  <g transform="rotate(-6 205 205)">
    <rect x="118" y="66" width="178" height="258" rx="32" fill="url(#cifPhone)"/>
    <rect x="118" y="66" width="178" height="258" rx="32" fill="#000" opacity=".05"/>
    <rect x="131" y="80" width="152" height="230" rx="22" fill="#ffffff"/>
    <circle cx="207" cy="150" r="35" fill="#15C15D"/>
    <path d="M213 131 l-19 27 13 0 -7 23 21 -29 -13 0 5 -21z" fill="#ffffff"/>
    <text x="207" y="214" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="15.5" font-weight="700" fill="#0E8741">Cash in Flash</text>
    <text x="207" y="250" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="800" fill="#15a04c">Approved!</text>
  </g>

  <!-- ===== Cash bundle: stacked bills wrapped with a paper band ===== -->
  <g transform="translate(312 214) rotate(-9)">
    <rect x="0" y="44" width="168" height="74" rx="9" fill="#2f9c56"/>
    <rect x="0" y="30" width="168" height="74" rx="9" fill="#3aac61"/>
    <rect x="0" y="16" width="168" height="74" rx="9" fill="#46b96c"/>
    <rect x="0" y="2"  width="168" height="74" rx="9" fill="url(#cifBill)"/>
    <circle cx="84" cy="39" r="17" fill="#eafaf0" opacity=".92"/>
    <text x="84" y="46" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="800" fill="#2f9c56">$</text>
    <rect x="14" y="14" width="20" height="13" rx="3" fill="#eafaf0" opacity=".5"/>
    <rect x="134" y="51" width="20" height="13" rx="3" fill="#1f7e44" opacity=".4"/>
    <rect x="-4" y="74" width="176" height="22" rx="4" fill="#f4e9c9"/>
    <rect x="-4" y="74" width="176" height="22" rx="4" fill="#000" opacity=".04"/>
  </g>

  <!-- ===== Gold coins ===== -->
  <g transform="translate(360 250)">
    <g>
      <ellipse cx="44" cy="70" rx="44" ry="15" fill="#d99400"/>
      <ellipse cx="44" cy="60" rx="44" ry="15" fill="#f0a91e"/>
      <ellipse cx="44" cy="50" rx="44" ry="15" fill="url(#cifCoin)"/>
      <ellipse cx="44" cy="50" rx="31" ry="9" fill="#ffe488"/>
      <text x="44" y="55" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="800" fill="#d99400">$</text>
    </g>
    <g transform="translate(62 14)">
      <ellipse cx="40" cy="64" rx="36" ry="12.5" fill="#d99400"/>
      <ellipse cx="40" cy="55" rx="36" ry="12.5" fill="#f0a91e"/>
      <ellipse cx="40" cy="46" rx="36" ry="12.5" fill="url(#cifCoin)"/>
      <text x="40" y="51" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="800" fill="#d99400">$</text>
    </g>
  </g>
</svg>
