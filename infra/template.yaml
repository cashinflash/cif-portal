AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  Cash in Flash — customer portal API (Round 19B).
  Adds the `loans` Lambda + two HttpApi routes backing the dashboard.
  This template is a PARTIAL — the full production stack (`cif-portal-dev`)
  was authored in prior rounds and its source was lost. The next session
  should either (a) recover the full template via
  `aws cloudformation get-template --stack-name cif-portal-dev` and merge
  this section in, or (b) treat this as a nested / additive stack.

Parameters:
  StackEnv:
    Type: String
    Default: dev
  VergentBaseUrl:
    Type: String
    Default: https://prod.apim.vergentlms.com/external/shared
  VergentSecretArn:
    Type: String
    Description: Secrets Manager ARN holding { xApiKey, logonName, password }
  # Reference existing HttpApi + JWT authorizer created by the base stack.
  HttpApiId:
    Type: String
    Description: Id of the existing cif-portal HttpApi.
  JwtAuthorizerId:
    Type: String
    Description: Id of the Cognito JWT authorizer attached to HttpApiId.

Globals:
  Function:
    Runtime: python3.12
    MemorySize: 256
    Timeout: 15
    Tracing: Active
    Architectures: [arm64]
    Environment:
      Variables:
        LOG_LEVEL: INFO

Resources:

  LoansFn:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub cif-portal-loans-${StackEnv}
      CodeUri: ../backend/
      Handler: handlers.loans.lambda_handler
      Timeout: 29
      Environment:
        Variables:
          VERGENT_BASE_URL: !Ref VergentBaseUrl
          VERGENT_SECRET_ARN: !Ref VergentSecretArn
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - secretsmanager:GetSecretValue
              Resource: !Ref VergentSecretArn
      Events:
        ActiveLoan:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApiId
            Method: GET
            Path: /api/my-loans/active
            Auth:
              Authorizer: JwtAuthorizer
              AuthorizerId: !Ref JwtAuthorizerId
        Activity:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApiId
            Method: GET
            Path: /api/my-loans/activity
            Auth:
              Authorizer: JwtAuthorizer
              AuthorizerId: !Ref JwtAuthorizerId
        LoanDocs:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApiId
            Method: GET
            Path: /api/my-loans/documents
            Auth:
              Authorizer: JwtAuthorizer
              AuthorizerId: !Ref JwtAuthorizerId
        LoanDocDownload:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApiId
            Method: GET
            Path: /api/my-loans/documents/{docId}/download
            Auth:
              Authorizer: JwtAuthorizer
              AuthorizerId: !Ref JwtAuthorizerId
        ProfileEmail:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApiId
            Method: PUT
            Path: /api/my-profile/email
            Auth:
              Authorizer: JwtAuthorizer
              AuthorizerId: !Ref JwtAuthorizerId
        ProfileAddress:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApiId
            Method: PUT
            Path: /api/my-profile/address
            Auth:
              Authorizer: JwtAuthorizer
              AuthorizerId: !Ref JwtAuthorizerId
        ProfilePhoneStart:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApiId
            Method: POST
            Path: /api/my-profile/phone/start-verify
            Auth:
              Authorizer: JwtAuthorizer
              AuthorizerId: !Ref JwtAuthorizerId
        ProfilePhoneConfirm:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApiId
            Method: POST
            Path: /api/my-profile/phone/confirm
            Auth:
              Authorizer: JwtAuthorizer
              AuthorizerId: !Ref JwtAuthorizerId
        EsignPending:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApiId
            Method: GET
            Path: /api/my-esign/pending
            Auth:
              Authorizer: JwtAuthorizer
              AuthorizerId: !Ref JwtAuthorizerId
        EsignResend:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApiId
            Method: POST
            Path: /api/my-esign/resend
            Auth:
              Authorizer: JwtAuthorizer
              AuthorizerId: !Ref JwtAuthorizerId

  PaymentsFn:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub cif-portal-payments-${StackEnv}
      CodeUri: ../backend/
      Handler: handlers.payments.lambda_handler
      Environment:
        Variables:
          VERGENT_APIM_BASE_URL: !Ref VergentBaseUrl
          VERGENT_SECRET_ARN: !Ref VergentSecretArn
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - secretsmanager:GetSecretValue
              Resource: !Ref VergentSecretArn
      Events:
        Cards:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApiId
            Method: GET
            Path: /api/my-cards
            Auth:
              Authorizer: JwtAuthorizer
              AuthorizerId: !Ref JwtAuthorizerId
        AddCard:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApiId
            Method: POST
            Path: /api/my-cards
            Auth:
              Authorizer: JwtAuthorizer
              AuthorizerId: !Ref JwtAuthorizerId
        LoanSummary:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApiId
            Method: GET
            Path: /api/my-payment/loan-summary
            Auth:
              Authorizer: JwtAuthorizer
              AuthorizerId: !Ref JwtAuthorizerId
        Pay:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApiId
            Method: POST
            Path: /api/my-payment
            Auth:
              Authorizer: JwtAuthorizer
              AuthorizerId: !Ref JwtAuthorizerId

  # HTML → PDF conversion Lambda (Node.js + headless Chromium). Driven
  # from the loans Lambda via boto3 lambda.invoke when a customer
  # requests ?format=pdf on /api/my-loans/documents/{id}/download.
  # Provisioned and deployed via .github/workflows/provision-doc-pdf.yml
  # and deploy-doc-pdf.yml — this declaration is documentation only;
  # the actual function is created/updated by the workflows because the
  # zipped artifact (~50 MB with chromium binary) needs S3-based deploy
  # which the SAM transform doesn't handle as cleanly.
  DocPdfFn:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub cif-portal-doc-pdf-${StackEnv}
      Runtime: nodejs20.x
      Architectures: [x86_64]
      MemorySize: 1024
      Timeout: 30
      Handler: index.handler
      CodeUri: ../backend/doc_pdf/
      Description: HTML → PDF conversion via puppeteer-core + chromium

Outputs:
  LoansFnArn:
    Value: !GetAtt LoansFn.Arn
    Export:
      Name: !Sub cif-portal-${StackEnv}-LoansFnArn
  DocPdfFnArn:
    Value: !GetAtt DocPdfFn.Arn
    Export:
      Name: !Sub cif-portal-${StackEnv}-DocPdfFnArn
