name: Provision IF (instant-funding) vault
# Auto-retrigger: 1776896192

# Creates all infrastructure for the /if card-handoff flow:
#   - KMS key (alias/cif-portal-if-vault) used to envelope-encrypt
#     card data at rest.
#   - DynamoDB table cif-portal-if-submissions-dev with TTL.
#   - Lambda cif-portal-if-dev fronting POST /api/if/submit and
#     GET  /api/if/view/{id}.
#   - IAM policy on the Lambda role for KMS encrypt/decrypt on the
#     key, DynamoDB RW on the table, and SES send.
#   - HttpApi routes on the existing cif-portal HttpApi (same api
#     id as payments / auth-mfa) with NO authorizer on /submit
#     (public form) and NO Cognito authorizer on /view either
#     (staff auth happens via the X-View-Secret header check in the
#     Lambda).
#   - Lambda env vars pointing at the secret values.
#
# Idempotent — safe to re-run. Skip-gates any step that's already
# done. Auto-triggers on change to this file or on dispatch.

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - 'claude/**'
    paths:
      - '.github/workflows/provision-if.yml'
      - 'backend/handlers/if_submit.py'

env:
  AWS_REGION: us-east-1
  HTTP_API_ID: anh066l1wf
  FN: cif-portal-if-dev
  TABLE: cif-portal-if-submissions-dev
  KMS_ALIAS: alias/cif-portal-if-vault
  NOTIFY_EMAIL: loans@cashinflash.com
  VIEW_URL_BASE: https://app.cashinflash.com/if/view
  MFA_FROM: no-reply@cashinflash.com
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  provision:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Package handlers
        run: |
          cd backend
          zip -qr /tmp/handlers.zip handlers -x "handlers/__pycache__/*" "*.pyc"

      - name: Ensure KMS key + alias
        id: kms
        run: |
          set -e
          ARN=$(aws kms describe-key --key-id "$KMS_ALIAS" \
            --query 'KeyMetadata.Arn' --output text 2>/dev/null || true)
          if [ -z "$ARN" ] || [ "$ARN" = "None" ]; then
            echo "Creating KMS key for IF vault"
            ARN=$(aws kms create-key \
              --description "Envelope-encrypts card data in cif-portal-if submissions" \
              --key-usage ENCRYPT_DECRYPT \
              --key-spec SYMMETRIC_DEFAULT \
              --query 'KeyMetadata.Arn' --output text)
            aws kms create-alias --alias-name "$KMS_ALIAS" --target-key-id "$ARN"
            echo "Created $KMS_ALIAS -> $ARN"
          else
            echo "KMS alias $KMS_ALIAS already exists: $ARN"
          fi
          echo "arn=$ARN" >> "$GITHUB_OUTPUT"

      - name: Ensure DynamoDB table with TTL
        run: |
          set -e
          if aws dynamodb describe-table --table-name "$TABLE" >/dev/null 2>&1; then
            echo "Table $TABLE already exists"
          else
            echo "Creating table $TABLE"
            aws dynamodb create-table \
              --table-name "$TABLE" \
              --billing-mode PAY_PER_REQUEST \
              --attribute-definitions AttributeName=submission_id,AttributeType=S \
              --key-schema AttributeName=submission_id,KeyType=HASH \
              --no-cli-pager >/dev/null
            aws dynamodb wait table-exists --table-name "$TABLE"
          fi

          # Enable TTL on ttl_epoch (idempotent; skip if already on).
          TTL_STATUS=$(aws dynamodb describe-time-to-live \
            --table-name "$TABLE" \
            --query 'TimeToLiveDescription.TimeToLiveStatus' --output text)
          if [ "$TTL_STATUS" != "ENABLED" ] && [ "$TTL_STATUS" != "ENABLING" ]; then
            aws dynamodb update-time-to-live \
              --table-name "$TABLE" \
              --time-to-live-specification "Enabled=true, AttributeName=ttl_epoch" \
              >/dev/null
            echo "Enabled TTL on $TABLE.ttl_epoch"
          else
            echo "TTL on $TABLE already $TTL_STATUS"
          fi

      - name: Generate view shared-secret if missing
        id: secret
        run: |
          set -e
          NAME="cif-portal/if/view-secret"
          if aws secretsmanager describe-secret --secret-id "$NAME" >/dev/null 2>&1; then
            echo "View secret already exists"
          else
            GEN=$(openssl rand -hex 32)
            aws secretsmanager create-secret \
              --name "$NAME" \
              --description "Shared secret for GET /api/if/view/{id} (dashboard→Lambda)" \
              --secret-string "{\"secret\":\"$GEN\"}" >/dev/null
            echo "Created $NAME"
          fi
          ARN=$(aws secretsmanager describe-secret --secret-id "$NAME" --query ARN --output text)
          VAL=$(aws secretsmanager get-secret-value --secret-id "$NAME" --query SecretString --output text | jq -r '.secret')
          echo "::add-mask::$VAL"
          echo "arn=$ARN" >> "$GITHUB_OUTPUT"
          echo "value=$VAL" >> "$GITHUB_OUTPUT"

      - name: Create or update IF Lambda
        env:
          KMS_ARN: ${{ steps.kms.outputs.arn }}
          VIEW_SECRET: ${{ steps.secret.outputs.value }}
        run: |
          set -e
          ENV_JSON=$(jq -n \
            --arg kms "$KMS_ALIAS" \
            --arg tbl "$TABLE" \
            --arg to "$NOTIFY_EMAIL" \
            --arg vs "$VIEW_SECRET" \
            --arg vu "$VIEW_URL_BASE" \
            --arg from "$MFA_FROM" \
            '{"Variables":{
              IF_KMS_KEY_ID: $kms,
              IF_DDB_TABLE: $tbl,
              IF_NOTIFY_EMAIL: $to,
              IF_VIEW_SHARED_SECRET: $vs,
              IF_VIEW_URL_BASE: $vu,
              MFA_EMAIL_SENDER: $from
            }}')

          if aws lambda get-function --function-name "$FN" >/dev/null 2>&1; then
            echo "$FN exists — leaving code to deploy.yml, refreshing env vars only."
            aws lambda wait function-updated --function-name "$FN"
            aws lambda update-function-configuration \
              --function-name "$FN" \
              --environment "$ENV_JSON" \
              --no-cli-pager >/dev/null
            aws lambda wait function-updated --function-name "$FN"
          else
            echo "$FN missing — creating from loans-dev template."
            LOANS_CFG=$(aws lambda get-function-configuration --function-name cif-portal-loans-dev)
            ROLE=$(echo "$LOANS_CFG" | jq -r '.Role')
            LAYERS_ARGS=()
            LAYER_LIST=$(echo "$LOANS_CFG" | jq -r '(.Layers // []) | map(.Arn) | .[]')
            if [ -n "$LAYER_LIST" ]; then
              while IFS= read -r arn; do
                LAYERS_ARGS+=("$arn")
              done <<< "$LAYER_LIST"
            fi
            CREATE_ARGS=(
              --function-name "$FN"
              --runtime python3.12
              --architectures arm64
              --role "$ROLE"
              --handler handlers.if_submit.lambda_handler
              --zip-file fileb:///tmp/handlers.zip
              --environment "$ENV_JSON"
              --memory-size 256
              --timeout 15
            )
            if [ ${#LAYERS_ARGS[@]} -gt 0 ]; then
              CREATE_ARGS+=(--layers "${LAYERS_ARGS[@]}")
            fi
            aws lambda create-function "${CREATE_ARGS[@]}" --no-cli-pager >/dev/null
            aws lambda wait function-active --function-name "$FN"
            echo "$FN created"
          fi

      - name: Grant KMS + DDB + SES permissions on the Lambda role
        env:
          KMS_ARN: ${{ steps.kms.outputs.arn }}
          SECRET_ARN: ${{ steps.secret.outputs.arn }}
        run: |
          set -e
          ROLE_ARN=$(aws lambda get-function-configuration \
            --function-name "$FN" --query 'Role' --output text)
          ROLE_NAME=$(echo "$ROLE_ARN" | awk -F/ '{print $NF}')
          ACCT=$(aws sts get-caller-identity --query Account --output text)
          TABLE_ARN="arn:aws:dynamodb:$AWS_REGION:$ACCT:table/$TABLE"

          POLICY=$(jq -n \
            --arg kms "$KMS_ARN" \
            --arg ddb "$TABLE_ARN" \
            --arg secret "$SECRET_ARN" \
            '{
              Version: "2012-10-17",
              Statement: [
                {Effect: "Allow", Action: ["kms:Encrypt","kms:Decrypt"], Resource: $kms},
                {Effect: "Allow", Action: ["dynamodb:PutItem","dynamodb:GetItem","dynamodb:DeleteItem","dynamodb:Scan"], Resource: $ddb},
                {Effect: "Allow", Action: ["ses:SendEmail","ses:SendRawEmail"], Resource: "*"},
                {Effect: "Allow", Action: ["secretsmanager:GetSecretValue"], Resource: $secret}
              ]
            }')

          aws iam put-role-policy \
            --role-name "$ROLE_NAME" \
            --policy-name if-vault-access \
            --policy-document "$POLICY"
          echo "IAM policy if-vault-access attached to $ROLE_NAME"

      - name: Wire HttpApi routes
        run: |
          set -e
          FN_ARN=$(aws lambda get-function --function-name "$FN" \
            --query 'Configuration.FunctionArn' --output text)
          ACCT=$(aws sts get-caller-identity --query Account --output text)

          # Reuse the AWS_PROXY integration for this Lambda if present.
          INTEG_ID=$(aws apigatewayv2 get-integrations --api-id "$HTTP_API_ID" \
            --query "Items[?IntegrationUri=='$FN_ARN'].IntegrationId | [0]" \
            --output text 2>/dev/null || echo "")
          if [ -z "$INTEG_ID" ] || [ "$INTEG_ID" = "None" ]; then
            INTEG_ID=$(aws apigatewayv2 create-integration \
              --api-id "$HTTP_API_ID" \
              --integration-type AWS_PROXY \
              --integration-uri "$FN_ARN" \
              --payload-format-version 2.0 \
              --query IntegrationId --output text)
            echo "Created integration $INTEG_ID"
          else
            echo "Reusing integration $INTEG_ID"
          fi

          # No Cognito authorizer on either route. /submit is public;
          # /view authorizes via the X-View-Secret header check in
          # the Lambda (so curl -H 'X-View-Secret: $VALUE' works for
          # the dashboard without a JWT dance).
          ROUTES=("POST /api/if/submit" "GET /api/if/list" "GET /api/if/view/{id}" "OPTIONS /api/if/submit" "OPTIONS /api/if/list" "OPTIONS /api/if/view/{id}")
          for RK in "${ROUTES[@]}"; do
            EXISTING=$(aws apigatewayv2 get-routes --api-id "$HTTP_API_ID" \
              --query "Items[?RouteKey=='$RK'].RouteId | [0]" \
              --output text 2>/dev/null || echo "")
            if [ -n "$EXISTING" ] && [ "$EXISTING" != "None" ]; then
              echo "Route '$RK' already exists ($EXISTING)"
              continue
            fi
            aws apigatewayv2 create-route \
              --api-id "$HTTP_API_ID" \
              --route-key "$RK" \
              --target "integrations/$INTEG_ID" \
              --authorization-type NONE \
              --no-cli-pager >/dev/null
            echo "Created route '$RK'"
          done

          # Grant HttpApi permission to invoke the Lambda.
          STMT_ID=apigateway-invoke-if
          EXISTING_SIDS=$(aws lambda get-policy --function-name "$FN" 2>/dev/null \
            | jq -r '.Policy | fromjson | .Statement[].Sid' 2>/dev/null || true)
          if echo "$EXISTING_SIDS" | grep -qxF "$STMT_ID"; then
            echo "Lambda invoke permission already present"
          else
            aws lambda add-permission \
              --function-name "$FN" \
              --statement-id "$STMT_ID" \
              --action lambda:InvokeFunction \
              --principal apigateway.amazonaws.com \
              --source-arn "arn:aws:execute-api:$AWS_REGION:$ACCT:$HTTP_API_ID/*/*/*" \
              --no-cli-pager >/dev/null
            echo "Added invoke permission."
          fi

      - name: Summary
        if: always()
        run: |
          {
            echo "### IF vault provisioned"
            echo ""
            echo "- Lambda: \`$FN\`"
            echo "- Table:  \`$TABLE\` (TTL on \`ttl_epoch\`, 72-hour retention)"
            echo "- KMS:    \`$KMS_ALIAS\`"
            echo "- Routes:"
            echo "  - \`POST /api/if/submit\` (public, no authorizer)"
            echo "  - \`GET  /api/if/view/{id}\` (X-View-Secret header auth)"
            echo ""
            echo "View-secret ARN: \`cif-portal/if/view-secret\` (dashboard reads this to call /view)."
          } >> "$GITHUB_STEP_SUMMARY"
