name: Diagnose onboard routing

# Read-only diagnostic. Dumps the API Gateway routes for the onboard group
# and the CloudFront behavior/origin map so we can see why a POST to
# /api/auth/onboard/mint-link returns an S3 AccessDenied (i.e. is reaching
# the S3 origin instead of API Gateway). Auto-runs when this file is pushed.
# Safe to delete afterwards — it changes nothing.
on:
  workflow_dispatch:
  push:
    branches:
      - 'claude/**'
    paths:
      - '.github/workflows/diagnose-onboard-routing.yml'

env:
  AWS_REGION: us-east-1
  HTTP_API_ID: anh066l1wf
  CF_DISTRIBUTION: EOV9K12LFKK8T

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: API Gateway routes (onboard + a known-working sample)
        run: |
          echo "=== ALL routes containing 'onboard' ==="
          aws apigatewayv2 get-routes --api-id "$HTTP_API_ID" \
            --query "Items[?contains(RouteKey, 'onboard')].RouteKey" --output json
          echo ""
          echo "=== known-working auth routes (for comparison) ==="
          aws apigatewayv2 get-routes --api-id "$HTTP_API_ID" \
            --query "Items[?contains(RouteKey, '/api/auth/')].RouteKey" --output json
          echo ""
          echo "=== total route count ==="
          aws apigatewayv2 get-routes --api-id "$HTTP_API_ID" \
            --query "length(Items)" --output text

      - name: CloudFront origins + behaviors
        run: |
          aws cloudfront get-distribution-config --id "$CF_DISTRIBUTION" \
            --query 'DistributionConfig.Origins.Items[].{Id:Id,Domain:DomainName}' \
            --output json
          echo "=== DEFAULT behavior target ==="
          aws cloudfront get-distribution-config --id "$CF_DISTRIBUTION" \
            --query 'DistributionConfig.DefaultCacheBehavior.TargetOriginId' --output text
          echo "=== ordered cache behaviors (PathPattern -> TargetOriginId) ==="
          aws cloudfront get-distribution-config --id "$CF_DISTRIBUTION" \
            --query 'DistributionConfig.CacheBehaviors.Items[].{Path:PathPattern,Target:TargetOriginId}' \
            --output json
