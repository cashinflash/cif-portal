name: Diagnose onboard routing

# Read-only. Pinpoints which missing header (User-Agent / Accept) makes
# Python http.client get an S3 403 where curl gets 401. Auto-runs on push.
on:
  workflow_dispatch:
  push:
    branches:
      - 'claude/**'
    paths:
      - '.github/workflows/diagnose-onboard-routing.yml'

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: http.client with various header sets
        run: |
          python3 - <<'PY'
          import http.client, ssl, json
          from urllib.parse import urlparse
          base = "https://my.cashinflash.com/api/auth/onboard/mint-link"
          u = urlparse(base)
          data = json.dumps({"customerId": "000000"}).encode()
          cases = {
              "no extra headers (current cif-apply)": {},
              "User-Agent only":                     {"User-Agent": "cif-apply/1.0"},
              "Accept only":                         {"Accept": "application/json"},
              "User-Agent + Accept":                 {"User-Agent": "cif-apply/1.0", "Accept": "application/json"},
          }
          for name, extra in cases.items():
              h = {"Content-Type": "application/json", "X-Api-Key": "bogus",
                   "Content-Length": str(len(data))}
              h.update(extra)
              conn = http.client.HTTPSConnection(u.netloc, timeout=20,
                                                 context=ssl.create_default_context())
              conn.request("POST", u.path, body=data, headers=h)
              r = conn.getresponse()
              body = r.read().decode("utf-8", "replace")
              print(f"{name:38s} -> HTTP {r.status}  server={r.getheader('server')}  body={body[:60]!r}")
              conn.close()
          PY
