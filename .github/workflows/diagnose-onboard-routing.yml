name: Diagnose onboard routing

# Read-only diagnostic. Curls the LIVE mint-link endpoint to see whether the
# default URL (https://my.cashinflash.com/api/auth/onboard/mint-link) reaches
# the Lambda (expect JSON 401 on a bogus key) or falls through to S3 (403 XML).
# This distinguishes "cif-apply's ONBOARD_MINT_URL is wrong" from "routing is
# actually broken". Auto-runs when this file is pushed. Changes nothing.
on:
  workflow_dispatch:
  push:
    branches:
      - 'claude/**'
    paths:
      - '.github/workflows/diagnose-onboard-routing.yml'

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Curl live mint-link with a bogus key (default URL)
        run: |
          echo "=== POST https://my.cashinflash.com/api/auth/onboard/mint-link (bogus key) ==="
          curl -sS -i -X POST 'https://my.cashinflash.com/api/auth/onboard/mint-link' \
            -H 'Content-Type: application/json' \
            -H 'X-Api-Key: diagnostic-bogus-key-not-real' \
            -d '{"customerId":"000000"}' --max-time 30 || echo "[curl exit $?]"
          echo ""
          echo "=== For contrast: POST to the bare domain root (expected S3 403) ==="
          curl -sS -i -X POST 'https://my.cashinflash.com/' \
            -H 'Content-Type: application/json' -d '{}' --max-time 30 | head -20 || echo "[curl exit $?]"

      - name: Curl a known-working auth route (login, bogus body)
        run: |
          echo "=== POST https://my.cashinflash.com/api/auth/login (bogus body) ==="
          curl -sS -i -X POST 'https://my.cashinflash.com/api/auth/login' \
            -H 'Content-Type: application/json' \
            -d '{"email":"diagnostic@example.com","password":"x"}' --max-time 30 | head -25 || echo "[curl exit $?]"
