name: Provision Search Rate Limit

# Creates the DynamoDB table + IAM + env vars that ACTIVATE the fail-open
# per-IP rate limiter in handlers/search.py for the pre-auth SSN-lookup
# endpoint (/api/search). Until this runs, SEARCH_RATELIMIT_TABLE is unset
# and the limiter is a no-op — so search behaves exactly as before.
#
# Defaults: 8 lookups per IP per 10-minute window. Tune via the
# SEARCH_RATELIMIT_MAX / SEARCH_RATELIMIT_WINDOW env vars on the Lambda.
#
# Auto-runs on push when this file changes (path-filtered); also runnable
# from the Actions tab. Idempotent.

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - 'claude/**'
    paths:
      - '.github/workflows/provision-search-ratelimit.yml'

env:
  AWS_REGION: us-east-1
  FN: cif-portal-search-dev
  TABLE: cif-portal-search-ratelimit-dev

jobs:
  provision:
    runs-on: ubuntu-latest
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Ensure DynamoDB table with TTL
        run: |
          set -e
          if aws dynamodb describe-table --table-name "$TABLE" >/dev/null 2>&1; then
            echo "Table $TABLE already exists"
          else
            aws dynamodb create-table \
              --table-name "$TABLE" \
              --attribute-definitions AttributeName=k,AttributeType=S \
              --key-schema AttributeName=k,KeyType=HASH \
              --billing-mode PAY_PER_REQUEST \
              --no-cli-pager
            aws dynamodb wait table-exists --table-name "$TABLE"
            echo "Created $TABLE"
          fi
          # Enable TTL so per-window counters self-expire.
          aws dynamodb update-time-to-live \
            --table-name "$TABLE" \
            --time-to-live-specification "Enabled=true,AttributeName=expiresAt" \
            --no-cli-pager 2>/dev/null || echo "TTL already enabled"

      - name: Grant the search Lambda role write access to the table
        run: |
          set -e
          ACCT=$(aws sts get-caller-identity --query Account --output text)
          TABLE_ARN="arn:aws:dynamodb:$AWS_REGION:$ACCT:table/$TABLE"
          ROLE_ARN=$(aws lambda get-function-configuration \
            --function-name "$FN" --query 'Role' --output text)
          ROLE_NAME="${ROLE_ARN##*/}"
          POLICY=$(jq -n --arg arn "$TABLE_ARN" '{
            Version: "2012-10-17",
            Statement: [{ Effect: "Allow", Action: ["dynamodb:UpdateItem"], Resource: $arn }]
          }')
          aws iam put-role-policy \
            --role-name "$ROLE_NAME" \
            --policy-name search-ratelimit-access \
            --policy-document "$POLICY" \
            --no-cli-pager
          echo "IAM policy search-ratelimit-access attached to $ROLE_NAME"

      - name: Set env vars on the search Lambda (activates the limiter)
        run: |
          set -e
          CURRENT=$(aws lambda get-function-configuration \
            --function-name "$FN" --query 'Environment.Variables' --output json)
          MERGED=$(echo "$CURRENT" | jq \
            --arg t "$TABLE" \
            '{Variables: ((. // {}) + {SEARCH_RATELIMIT_TABLE: $t})}')
          aws lambda update-function-configuration \
            --function-name "$FN" \
            --environment "$MERGED" \
            --no-cli-pager >/dev/null
          echo "Set SEARCH_RATELIMIT_TABLE=$TABLE on $FN"

      - name: Summary
        if: always()
        run: |
          {
            echo "### Search rate-limit provisioning"
            echo ""
            echo "- Table: \`$TABLE\` (TTL on \`expiresAt\`)"
            echo "- Lambda: \`$FN\` — \`SEARCH_RATELIMIT_TABLE\` set"
            echo "- Default: 8 lookups / IP / 10 min (fail-open)"
          } >> "$GITHUB_STEP_SUMMARY"
