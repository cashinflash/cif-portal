name: Provision presence store

# Creates the DynamoDB table that backs the admin "online / offline" dot on the
# customers page (the portal heartbeats lastSeenAt here), grants the loans
# Lambda access via a SEPARATE inline policy (additive — a new policy name, so
# existing permissions are never touched), and wires the customer-authed
# POST /api/presence/ping route. Idempotent; safe to re-run. Auto-runs when
# this file is pushed.
on:
  workflow_dispatch:
  push:
    branches:
      - 'claude/**'
    paths:
      - '.github/workflows/provision-presence.yml'

env:
  AWS_REGION: us-east-1
  TABLE: cif-portal-presence-dev
  HTTP_API_ID: anh066l1wf
  AUTHORIZER_ID: ppc9vg
  FN: cif-portal-loans-dev

jobs:
  provision:
    runs-on: ubuntu-latest
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Create table (idempotent) + TTL
        run: |
          set -e
          if aws dynamodb describe-table --table-name "$TABLE" >/dev/null 2>&1; then
            echo "Table $TABLE already exists."
          else
            aws dynamodb create-table \
              --table-name "$TABLE" \
              --attribute-definitions AttributeName=sub,AttributeType=S \
              --key-schema AttributeName=sub,KeyType=HASH \
              --billing-mode PAY_PER_REQUEST \
              --no-cli-pager >/dev/null
            aws dynamodb wait table-exists --table-name "$TABLE"
            echo "Created $TABLE."
          fi
          TTL_STATUS=$(aws dynamodb describe-time-to-live --table-name "$TABLE" \
            --query 'TimeToLiveDescription.TimeToLiveStatus' --output text 2>/dev/null || echo "DISABLED")
          if [ "$TTL_STATUS" != "ENABLED" ] && [ "$TTL_STATUS" != "ENABLING" ]; then
            aws dynamodb update-time-to-live --table-name "$TABLE" \
              --time-to-live-specification "Enabled=true, AttributeName=expiresAt" \
              --no-cli-pager >/dev/null
            echo "TTL enabled on expiresAt."
          else
            echo "TTL already $TTL_STATUS."
          fi

      - name: Grant loans Lambda access (additive inline policy)
        run: |
          set -e
          ACCT=$(aws sts get-caller-identity --query Account --output text)
          TABLE_ARN="arn:aws:dynamodb:$AWS_REGION:$ACCT:table/$TABLE"
          POLICY_DOC='{"Version":"2012-10-17","Statement":[{"Sid":"PresenceTable","Effect":"Allow","Action":["dynamodb:PutItem","dynamodb:GetItem","dynamodb:BatchGetItem"],"Resource":"'"$TABLE_ARN"'"}]}'
          ROLE_ARN=$(aws lambda get-function-configuration --function-name "$FN" --query 'Role' --output text)
          ROLE_NAME="${ROLE_ARN##*/}"
          aws iam put-role-policy \
            --role-name "$ROLE_NAME" \
            --policy-name "cif-portal-presence-rw" \
            --policy-document "$POLICY_DOC" \
            --no-cli-pager
          echo "Attached presence policy to $ROLE_NAME ($FN)."

      - name: Wire POST /api/presence/ping (Cognito JWT)
        run: |
          set -e
          FN_ARN=$(aws lambda get-function --function-name "$FN" --query 'Configuration.FunctionArn' --output text)
          INTEG_ID=$(aws apigatewayv2 get-integrations --api-id "$HTTP_API_ID" \
            --query "Items[?IntegrationUri=='$FN_ARN'].IntegrationId" \
            --output text 2>/dev/null | head -n 1 || echo "")
          if [ -z "$INTEG_ID" ] || [ "$INTEG_ID" = "None" ]; then
            echo "ERROR: could not find the loans Lambda integration"; exit 1
          fi
          echo "Reusing integration $INTEG_ID"
          RK="POST /api/presence/ping"
          EXISTING=$(aws apigatewayv2 get-routes --api-id "$HTTP_API_ID" \
            --query "Items[?RouteKey=='$RK'].RouteId" --output text 2>/dev/null | head -n 1 || echo "")
          if [ -n "$EXISTING" ] && [ "$EXISTING" != "None" ]; then
            echo "Route '$RK' already exists ($EXISTING)"
          else
            aws apigatewayv2 create-route \
              --api-id "$HTTP_API_ID" \
              --route-key "$RK" \
              --target "integrations/$INTEG_ID" \
              --authorization-type JWT \
              --authorizer-id "$AUTHORIZER_ID" \
              --no-cli-pager >/dev/null
            echo "Created route '$RK'"
          fi

      - name: Summary
        if: always()
        run: |
          {
            echo "### presence store"
            echo "- Table: \`$TABLE\` (key sub, TTL expiresAt, PAY_PER_REQUEST)"
            echo "- IAM: \`cif-portal-presence-rw\` on the loans role"
            echo "- Route: \`POST /api/presence/ping\` (Cognito JWT)"
          } >> "$GITHUB_STEP_SUMMARY"
