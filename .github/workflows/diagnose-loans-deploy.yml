name: Diagnose loans Lambda deploy

# One-shot diagnostic: figure out why the deployed loans Lambda appears to run
# OLDER code than the repo HEAD. Read-only. Robust (never set -e aborts).
on:
  workflow_dispatch:
  push:
    branches:
      - 'claude/**'
    paths:
      - '.github/workflows/diagnose-loans-deploy.yml'

env:
  AWS_REGION: us-east-1
  FN: cif-portal-loans-dev
  HTTP_API_ID: anh066l1wf

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Route -> integration -> Lambda mapping
        run: |
          echo "### All integrations on $HTTP_API_ID (id -> uri)"
          aws apigatewayv2 get-integrations --api-id "$HTTP_API_ID" \
            --query 'Items[].{Id:IntegrationId,Uri:IntegrationUri}' --output table || true
          echo ""
          echo "### The route we care about"
          aws apigatewayv2 get-routes --api-id "$HTTP_API_ID" \
            --query "Items[?RouteKey=='GET /api/my-loans/active'].{Route:RouteKey,Target:Target}" \
            --output json || true
          echo ""
          echo "### Resolve that route's integration URI"
          TARGET=$(aws apigatewayv2 get-routes --api-id "$HTTP_API_ID" \
            --query "Items[?RouteKey=='GET /api/my-loans/active'] | [0].Target" --output text 2>/dev/null)
          echo "raw target: [$TARGET]"
          INTEG_ID=$(printf '%s' "$TARGET" | sed 's#integrations/##' | tr -d '[:space:]')
          echo "integration id: [$INTEG_ID]"
          if [ -n "$INTEG_ID" ] && [ "$INTEG_ID" != "None" ]; then
            aws apigatewayv2 get-integration --api-id "$HTTP_API_ID" --integration-id "$INTEG_ID" \
              --query '{Uri:IntegrationUri,Type:IntegrationType,Payload:PayloadFormatVersion}' --output table || true
          fi

      - name: cif-portal-loans-dev config
        run: |
          aws lambda get-function-configuration --function-name "$FN" \
            --query '{LastModified:LastModified,LastUpdateStatus:LastUpdateStatus,CodeSha256:CodeSha256,CodeSize:CodeSize}' \
            --output table || true

      - name: Grep the LIVE code of cif-portal-loans-dev
        run: |
          URL=$(aws lambda get-function --function-name "$FN" --query 'Code.Location' --output text 2>/dev/null)
          if [ -n "$URL" ]; then
            curl -s "$URL" -o /tmp/live.zip
            mkdir -p /tmp/live && (cd /tmp/live && unzip -oq /tmp/live.zip)
            echo "### Markers in LIVE handlers/loans.py on $FN"
            echo "loanDetailProbe          : $(grep -c 'loanDetailProbe'          /tmp/live/handlers/loans.py 2>/dev/null || echo MISSING_FILE)"
            echo "disbursementProbe (new)  : $(grep -c 'disbursementProbe'        /tmp/live/handlers/loans.py 2>/dev/null || echo 0)"
            echo "disbursementDocs (old)   : $(grep -c 'disbursementDocs'         /tmp/live/handlers/loans.py 2>/dev/null || echo 0)"
            echo "_fetch_loans_winner_idx  : $(grep -c '_fetch_loans_winner_idx'  /tmp/live/handlers/loans.py 2>/dev/null || echo 0)"
            echo "patch-fees parallel      : $(grep -c 'patch-fees parallel'      /tmp/live/handlers/loans.py 2>/dev/null || echo 0)"
          else
            echo "could not get code location"
          fi

      - name: If the route points elsewhere, grep THAT Lambda too
        run: |
          TARGET=$(aws apigatewayv2 get-routes --api-id "$HTTP_API_ID" \
            --query "Items[?RouteKey=='GET /api/my-loans/active'] | [0].Target" --output text 2>/dev/null)
          INTEG_ID=$(printf '%s' "$TARGET" | sed 's#integrations/##' | tr -d '[:space:]')
          URI=$(aws apigatewayv2 get-integration --api-id "$HTTP_API_ID" --integration-id "$INTEG_ID" \
            --query 'IntegrationUri' --output text 2>/dev/null)
          echo "Integration URI: [$URI]"
          # Pull the function name out of the ARN (handles :alias / :version qualifiers).
          RFN=$(printf '%s' "$URI" | sed -E 's#.*function:([^/:]+).*#\1#')
          echo "Routed function name: [$RFN]"
          if [ -n "$RFN" ] && [ "$RFN" != "$FN" ]; then
            echo ">>> Route points to a DIFFERENT function than $FN <<<"
          fi
          if [ -n "$RFN" ]; then
            aws lambda get-function-configuration --function-name "$RFN" \
              --query '{Fn:FunctionName,LastModified:LastModified,CodeSha256:CodeSha256}' --output table || true
            RURL=$(aws lambda get-function --function-name "$RFN" --query 'Code.Location' --output text 2>/dev/null)
            if [ -n "$RURL" ]; then
              curl -s "$RURL" -o /tmp/r.zip
              mkdir -p /tmp/r && (cd /tmp/r && unzip -oq /tmp/r.zip)
              echo "### Markers in the ROUTED function's handlers/loans.py"
              echo "loanDetailProbe         : $(grep -c 'loanDetailProbe'         /tmp/r/handlers/loans.py 2>/dev/null || echo MISSING_FILE)"
              echo "disbursementDocs (old)  : $(grep -c 'disbursementDocs'        /tmp/r/handlers/loans.py 2>/dev/null || echo 0)"
              echo "_fetch_loans_winner_idx : $(grep -c '_fetch_loans_winner_idx' /tmp/r/handlers/loans.py 2>/dev/null || echo 0)"
            fi
          fi
