name: Provision Plaid

# One-shot / re-runnable provisioning for the Plaid bank-link
# integration on the customer portal.
#
# Steps:
#  1. Store/refresh {clientId, secret, env} in Secrets Manager at
#     cif-portal/plaid/credentials.
#  2. Create the DDB items table cif-portal-plaid-items-dev if
#     missing (PK customerId, SK itemId, PAY_PER_REQUEST, AWS-
#     managed encryption at rest).
#  3. Attach IAM policy `cif-portal-plaid` to the loans Lambda
#     role granting:
#       - secretsmanager:GetSecretValue on the Plaid secret
#       - dynamodb:PutItem|GetItem|Query|DeleteItem on the table
#  4. Set PLAID_SECRET_ARN + PLAID_ITEMS_TABLE env vars on the
#     loans Lambda (preserving existing env).
#
# Re-run to rotate the Plaid secret (paste the new one in;
# resource policies / table / env all stay in place).

on:
  workflow_dispatch:
    inputs:
      client_id:
        description: Plaid client_id
        required: true
      secret:
        description: Plaid secret (production / development / sandbox)
        required: true
      env:
        description: Plaid environment
        required: true
        default: production
        type: choice
        options:
          - production
          - development
          - sandbox

env:
  AWS_REGION: us-east-1
  SECRET_NAME: cif-portal/plaid/credentials
  TABLE_NAME: cif-portal-plaid-items-dev
  LOANS_FN: cif-portal-loans-dev

jobs:
  provision:
    runs-on: ubuntu-latest
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Mask Plaid credentials in logs
        env:
          CID: ${{ github.event.inputs.client_id }}
          SEC: ${{ github.event.inputs.secret }}
        run: |
          echo "::add-mask::$CID"
          echo "::add-mask::$SEC"

      - name: Store/refresh Plaid secret
        env:
          CID: ${{ github.event.inputs.client_id }}
          SEC: ${{ github.event.inputs.secret }}
          ENV: ${{ github.event.inputs.env }}
        run: |
          set -e
          PAYLOAD=$(jq -n \
            --arg id "$CID" \
            --arg sec "$SEC" \
            --arg env "$ENV" \
            '{clientId: $id, secret: $sec, env: $env}')

          if aws secretsmanager describe-secret --secret-id "$SECRET_NAME" >/dev/null 2>&1; then
            aws secretsmanager put-secret-value \
              --secret-id "$SECRET_NAME" \
              --secret-string "$PAYLOAD" >/dev/null
            echo "Updated existing secret $SECRET_NAME (env=$ENV)"
          else
            aws secretsmanager create-secret \
              --name "$SECRET_NAME" \
              --description "Plaid API credentials for cif-portal" \
              --secret-string "$PAYLOAD" >/dev/null
            echo "Created secret $SECRET_NAME (env=$ENV)"
          fi

      - name: Create DDB table if missing
        run: |
          set -e
          if aws dynamodb describe-table --table-name "$TABLE_NAME" >/dev/null 2>&1; then
            echo "Table $TABLE_NAME already exists."
          else
            echo "Creating $TABLE_NAME..."
            aws dynamodb create-table \
              --table-name "$TABLE_NAME" \
              --attribute-definitions \
                AttributeName=customerId,AttributeType=S \
                AttributeName=itemId,AttributeType=S \
              --key-schema \
                AttributeName=customerId,KeyType=HASH \
                AttributeName=itemId,KeyType=RANGE \
              --billing-mode PAY_PER_REQUEST \
              --no-cli-pager >/dev/null
            aws dynamodb wait table-exists --table-name "$TABLE_NAME"
            echo "Created $TABLE_NAME."
          fi

      - name: Grant IAM + set env on the loans Lambda
        run: |
          set -e
          SECRET_ARN=$(aws secretsmanager describe-secret \
            --secret-id "$SECRET_NAME" --query ARN --output text)
          TABLE_ARN=$(aws dynamodb describe-table \
            --table-name "$TABLE_NAME" --query 'Table.TableArn' --output text)
          echo "Secret ARN: $SECRET_ARN"
          echo "Table ARN: $TABLE_ARN"

          POLICY_DOC=$(jq -n \
            --arg secret "$SECRET_ARN" \
            --arg table "$TABLE_ARN" \
            '{
              "Version": "2012-10-17",
              "Statement": [
                {
                  "Sid": "PlaidSecretRead",
                  "Effect": "Allow",
                  "Action": "secretsmanager:GetSecretValue",
                  "Resource": $secret
                },
                {
                  "Sid": "PlaidItemsTable",
                  "Effect": "Allow",
                  "Action": [
                    "dynamodb:GetItem",
                    "dynamodb:PutItem",
                    "dynamodb:DeleteItem",
                    "dynamodb:Query",
                    "dynamodb:UpdateItem"
                  ],
                  "Resource": $table
                }
              ]
            }')

          ROLE_ARN=$(aws lambda get-function-configuration \
            --function-name "$LOANS_FN" --query 'Role' --output text)
          ROLE_NAME="${ROLE_ARN##*/}"
          echo "Lambda $LOANS_FN role: $ROLE_NAME"

          aws iam put-role-policy \
            --role-name "$ROLE_NAME" \
            --policy-name cif-portal-plaid \
            --policy-document "$POLICY_DOC" \
            --no-cli-pager
          echo "IAM policy cif-portal-plaid attached."

          CURRENT_ENV=$(aws lambda get-function-configuration \
            --function-name "$LOANS_FN" \
            --query 'Environment.Variables' --output json 2>/dev/null)
          if [ "$CURRENT_ENV" = "null" ] || [ -z "$CURRENT_ENV" ]; then
            CURRENT_ENV='{}'
          fi
          ENV_JSON=$(echo "$CURRENT_ENV" | jq \
            --arg arn "$SECRET_ARN" \
            --arg tbl "$TABLE_NAME" \
            '{Variables: (. + {PLAID_SECRET_ARN: $arn, PLAID_ITEMS_TABLE: $tbl})}')
          aws lambda update-function-configuration \
            --function-name "$LOANS_FN" \
            --environment "$ENV_JSON" \
            --no-cli-pager >/dev/null
          aws lambda wait function-updated --function-name "$LOANS_FN"
          echo "Env vars PLAID_SECRET_ARN + PLAID_ITEMS_TABLE set on $LOANS_FN."

      - name: Summary
        if: always()
        env:
          ENV: ${{ github.event.inputs.env }}
        run: |
          {
            echo "### Plaid provisioning"
            echo ""
            echo "- Secret: \`$SECRET_NAME\` (env=\`$ENV\`)"
            echo "- DDB table: \`$TABLE_NAME\` (PAY_PER_REQUEST)"
            echo "- IAM policy: \`cif-portal-plaid\` attached to \`$LOANS_FN\` role"
            echo "- Env vars set on \`$LOANS_FN\`:"
            echo "  - \`PLAID_SECRET_ARN\`"
            echo "  - \`PLAID_ITEMS_TABLE\`"
            echo ""
            echo "Next: re-run \`provision-loans.yml\` to register the 4 new Plaid HTTP routes, then test from the portal Profile page."
          } >> "$GITHUB_STEP_SUMMARY"
