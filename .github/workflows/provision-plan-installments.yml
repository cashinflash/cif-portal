name: Provision plan-installments store

# Creates the DynamoDB table the portal uses to REMEMBER a payment plan's
# installment amount (Vergent hides the next installment between due dates), and
# grants the loans + payments Lambdas GetItem/PutItem via a SEPARATE inline
# policy (additive — a new policy name, so existing permissions are never
# touched). Idempotent; safe to re-run. Auto-runs when this file is pushed.
on:
  workflow_dispatch:
  push:
    branches:
      - 'claude/**'
    paths:
      - '.github/workflows/provision-plan-installments.yml'

env:
  AWS_REGION: us-east-1
  TABLE: cif-portal-plan-installments-dev

jobs:
  provision:
    runs-on: ubuntu-latest
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Create table (idempotent) + TTL
        run: |
          set -e
          if aws dynamodb describe-table --table-name "$TABLE" >/dev/null 2>&1; then
            echo "Table $TABLE already exists."
          else
            aws dynamodb create-table \
              --table-name "$TABLE" \
              --attribute-definitions AttributeName=loanId,AttributeType=S \
              --key-schema AttributeName=loanId,KeyType=HASH \
              --billing-mode PAY_PER_REQUEST \
              --no-cli-pager >/dev/null
            aws dynamodb wait table-exists --table-name "$TABLE"
            echo "Created $TABLE."
          fi
          TTL_STATUS=$(aws dynamodb describe-time-to-live --table-name "$TABLE" \
            --query 'TimeToLiveDescription.TimeToLiveStatus' --output text 2>/dev/null || echo "DISABLED")
          if [ "$TTL_STATUS" != "ENABLED" ] && [ "$TTL_STATUS" != "ENABLING" ]; then
            aws dynamodb update-time-to-live --table-name "$TABLE" \
              --time-to-live-specification "Enabled=true, AttributeName=expiresAt" \
              --no-cli-pager >/dev/null
            echo "TTL enabled on expiresAt."
          else
            echo "TTL already $TTL_STATUS."
          fi

      - name: Grant loans + payments Lambdas access (additive inline policy)
        run: |
          set -e
          ACCT=$(aws sts get-caller-identity --query Account --output text)
          TABLE_ARN="arn:aws:dynamodb:$AWS_REGION:$ACCT:table/$TABLE"
          POLICY_DOC='{"Version":"2012-10-17","Statement":[{"Sid":"PlanInstallmentsTable","Effect":"Allow","Action":["dynamodb:PutItem","dynamodb:GetItem"],"Resource":"'"$TABLE_ARN"'"}]}'
          for FN in cif-portal-loans-dev cif-portal-payments-dev; do
            ROLE_ARN=$(aws lambda get-function-configuration --function-name "$FN" --query 'Role' --output text)
            ROLE_NAME="${ROLE_ARN##*/}"
            aws iam put-role-policy \
              --role-name "$ROLE_NAME" \
              --policy-name "cif-portal-plan-installments-rw" \
              --policy-document "$POLICY_DOC" \
              --no-cli-pager
            echo "Attached plan-installments policy to $ROLE_NAME ($FN)."
          done

      - name: Summary
        if: always()
        run: |
          {
            echo "### plan-installments store"
            echo "- Table: \`$TABLE\` (key loanId, TTL expiresAt, PAY_PER_REQUEST)"
            echo "- IAM: \`cif-portal-plan-installments-rw\` on loans + payments roles"
          } >> "$GITHUB_STEP_SUMMARY"
