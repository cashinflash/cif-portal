name: Provision loans Lambda

# Reconciles every HttpApi route the loans Lambda backs. Idempotent —
# routes that already exist are skipped, missing ones are created.
# Run this after adding a new route in code (and template.yaml). The
# regular deploy.yml takes care of Lambda code updates on push.

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - 'claude/**'
    paths:
      - '.github/workflows/provision-loans.yml'

env:
  AWS_REGION: us-east-1
  HTTP_API_ID: anh066l1wf
  AUTHORIZER_ID: ppc9vg
  FN: cif-portal-loans-dev
  PROFILE_REQUESTS_TABLE: cif-portal-profile-change-requests-dev
  ADMIN_NOTIFY_EMAIL: support@cashinflash.com
  SES_SENDER_EMAIL: no-reply@cashinflash.com

jobs:
  provision:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Wire HttpApi routes
        run: |
          set -e
          FN_ARN=$(aws lambda get-function --function-name "$FN" --query 'Configuration.FunctionArn' --output text)
          ACCT=$(aws sts get-caller-identity --query Account --output text)
          echo "Lambda ARN: $FN_ARN"
          echo "API: $HTTP_API_ID  Authorizer: $AUTHORIZER_ID"

          INTEG_ID=$(aws apigatewayv2 get-integrations --api-id "$HTTP_API_ID" \
            --query "Items[?IntegrationUri=='$FN_ARN'].IntegrationId | [0]" \
            --output text 2>/dev/null || echo "")
          if [ -z "$INTEG_ID" ] || [ "$INTEG_ID" = "None" ]; then
            INTEG_ID=$(aws apigatewayv2 create-integration \
              --api-id "$HTTP_API_ID" \
              --integration-type AWS_PROXY \
              --integration-uri "$FN_ARN" \
              --payload-format-version 2.0 \
              --query IntegrationId --output text)
            echo "Created integration $INTEG_ID"
          else
            echo "Reusing integration $INTEG_ID"
          fi

          ROUTES=(
            "GET /api/my-profile"
            "PUT /api/my-profile/email"
            "PUT /api/my-profile/address"
            "POST /api/my-profile/phone/start-verify"
            "POST /api/my-profile/phone/confirm"
            "GET /api/my-loans/active"
            "GET /api/my-loans/activity"
            "GET /api/my-loans/documents"
            "GET /api/my-loans/documents/{docId}/download"
            "POST /api/my-loan/new"
          )
          for RK in "${ROUTES[@]}"; do
            # NOTE: --query "Items[?...].RouteId | [0]" with --output text
            # was returning multi-line "None\nNone" for non-existent routes,
            # which the existence check below treated as a real id and
            # silently skipped creation. Drop the | [0], take head -n 1
            # explicitly. Empty output = route doesn't exist.
            EXISTING=$(aws apigatewayv2 get-routes --api-id "$HTTP_API_ID" \
              --query "Items[?RouteKey=='$RK'].RouteId" \
              --output text 2>/dev/null | head -n 1 || echo "")
            if [ -n "$EXISTING" ] && [ "$EXISTING" != "None" ]; then
              echo "Route '$RK' already exists ($EXISTING)"
              continue
            fi
            CREATED_ID=$(aws apigatewayv2 create-route \
              --api-id "$HTTP_API_ID" \
              --route-key "$RK" \
              --target "integrations/$INTEG_ID" \
              --authorization-type JWT \
              --authorizer-id "$AUTHORIZER_ID" \
              --query RouteId --output text \
              --no-cli-pager)
            echo "Created route '$RK' ($CREATED_ID)"
          done

          STMT_ID=apigateway-invoke-loans
          EXISTING_SIDS=$(aws lambda get-policy --function-name "$FN" 2>/dev/null \
            | jq -r '.Policy | fromjson | .Statement[].Sid' 2>/dev/null \
            || true)
          if echo "$EXISTING_SIDS" | grep -qxF "$STMT_ID"; then
            echo "Lambda permission $STMT_ID already set."
          else
            aws lambda add-permission \
              --function-name "$FN" \
              --statement-id "$STMT_ID" \
              --action lambda:InvokeFunction \
              --principal apigateway.amazonaws.com \
              --source-arn "arn:aws:execute-api:$AWS_REGION:$ACCT:$HTTP_API_ID/*/*/*" \
              --no-cli-pager >/dev/null
            echo "Added invoke permission."
          fi

      - name: Provision profile-change-requests DynamoDB table
        run: |
          set -e
          if aws dynamodb describe-table --table-name "$PROFILE_REQUESTS_TABLE" >/dev/null 2>&1; then
            echo "Table $PROFILE_REQUESTS_TABLE already exists."
          else
            aws dynamodb create-table \
              --table-name "$PROFILE_REQUESTS_TABLE" \
              --attribute-definitions AttributeName=requestId,AttributeType=S \
              --key-schema AttributeName=requestId,KeyType=HASH \
              --billing-mode PAY_PER_REQUEST \
              --no-cli-pager >/dev/null
            echo "Created table $PROFILE_REQUESTS_TABLE — waiting for ACTIVE…"
            aws dynamodb wait table-exists --table-name "$PROFILE_REQUESTS_TABLE"
          fi

          # Enable TTL on expiresAt (90-day audit-trail retention).
          TTL_STATUS=$(aws dynamodb describe-time-to-live --table-name "$PROFILE_REQUESTS_TABLE" \
            --query 'TimeToLiveDescription.TimeToLiveStatus' --output text 2>/dev/null || echo "DISABLED")
          if [ "$TTL_STATUS" != "ENABLED" ] && [ "$TTL_STATUS" != "ENABLING" ]; then
            aws dynamodb update-time-to-live \
              --table-name "$PROFILE_REQUESTS_TABLE" \
              --time-to-live-specification "Enabled=true, AttributeName=expiresAt" \
              --no-cli-pager >/dev/null
            echo "TTL enabled on expiresAt."
          else
            echo "TTL already $TTL_STATUS."
          fi

      - name: Grant Lambda DynamoDB + SES permissions
        run: |
          set -e
          ROLE_ARN=$(aws lambda get-function-configuration --function-name "$FN" \
            --query 'Role' --output text)
          ROLE_NAME="${ROLE_ARN##*/}"
          ACCT=$(aws sts get-caller-identity --query Account --output text)
          TABLE_ARN="arn:aws:dynamodb:$AWS_REGION:$ACCT:table/$PROFILE_REQUESTS_TABLE"

          POLICY_NAME=cif-portal-loans-profile-requests
          POLICY_DOC=$(cat <<EOF
          {
            "Version": "2012-10-17",
            "Statement": [
              {
                "Sid": "ProfileRequestsTable",
                "Effect": "Allow",
                "Action": [
                  "dynamodb:PutItem",
                  "dynamodb:GetItem",
                  "dynamodb:UpdateItem",
                  "dynamodb:Query"
                ],
                "Resource": "$TABLE_ARN"
              },
              {
                "Sid": "AdminNotifyEmail",
                "Effect": "Allow",
                "Action": [
                  "ses:SendEmail",
                  "ses:SendRawEmail"
                ],
                "Resource": "*"
              }
            ]
          }
          EOF
          )
          aws iam put-role-policy \
            --role-name "$ROLE_NAME" \
            --policy-name "$POLICY_NAME" \
            --policy-document "$POLICY_DOC" \
            --no-cli-pager
          echo "Inline policy $POLICY_NAME attached to $ROLE_NAME."

      - name: Set Lambda env vars for profile-change-request workflow
        run: |
          set -e
          # Merge new vars with existing env so we don't drop anything.
          CURRENT=$(aws lambda get-function-configuration --function-name "$FN" \
            --query 'Environment.Variables' --output json)
          ENV_JSON=$(echo "$CURRENT" | jq \
            --arg t "$PROFILE_REQUESTS_TABLE" \
            --arg a "$ADMIN_NOTIFY_EMAIL" \
            --arg s "$SES_SENDER_EMAIL" \
            '{Variables: (. + {PROFILE_REQUESTS_TABLE: $t, ADMIN_NOTIFY_EMAIL: $a, SES_SENDER_EMAIL: $s})}')
          # AWS CLI's --environment expects JSON like {"Variables":{...}}, NOT
          # the shorthand "Variables={...}" form (the latter only works with
          # CLI shorthand key=value syntax, not JSON values).
          aws lambda update-function-configuration \
            --function-name "$FN" \
            --environment "$ENV_JSON" \
            --no-cli-pager >/dev/null
          echo "Updated env vars on $FN:"
          echo "  PROFILE_REQUESTS_TABLE=$PROFILE_REQUESTS_TABLE"
          echo "  ADMIN_NOTIFY_EMAIL=$ADMIN_NOTIFY_EMAIL"
          echo "  SES_SENDER_EMAIL=$SES_SENDER_EMAIL"

      - name: Summary
        if: always()
        run: |
          {
            echo "### Loans provisioning"
            echo ""
            echo "- Lambda: $FN"
            echo "- Routes:"
            echo "  - GET /api/my-profile"
            echo "  - PUT /api/my-profile/email"
            echo "  - PUT /api/my-profile/address"
            echo "  - POST /api/my-profile/phone/start-verify"
            echo "  - POST /api/my-profile/phone/confirm"
            echo "  - GET /api/my-loans/active"
            echo "  - GET /api/my-loans/activity"
            echo "  - GET /api/my-loans/documents"
            echo "  - GET /api/my-loans/documents/{docId}/download"
            echo "  - POST /api/my-loan/new"
            echo ""
            echo "- Profile change-request queue:"
            echo "  - DDB table: $PROFILE_REQUESTS_TABLE (TTL on expiresAt)"
            echo "  - Admin notifications: $ADMIN_NOTIFY_EMAIL"
            echo "  - SES sender: $SES_SENDER_EMAIL"
          } >> "$GITHUB_STEP_SUMMARY"
