name: Store Repay credentials

# One-off / rotation workflow. Takes Repay API credentials as manual
# inputs and stores them as a single JSON secret in AWS Secrets
# Manager at cif-portal/repay/credentials. Safe to run whenever you
# rotate a token — updates the existing secret in place.
#
# Values are masked in logs via ::add-mask::. They do briefly travel
# through the workflow_dispatch request URL, which lives in the
# GitHub Actions audit log — this is acceptable for initial storage
# but prefer running rotations via the AWS console for max security
# once the secret is established.

on:
  workflow_dispatch:
    inputs:
      gateway_api_user:
        description: Gateway API User (e.g. vergentAPI1073745651)
        required: true
      gateway_secure_token:
        description: Gateway Secure Token (long base64 string)
        required: true
      gateway_merchant_id:
        description: Gateway Merchant ID (e.g. 1073745651)
        required: true
      customer_portal_url:
        description: Customer Portal URL (e.g. https://cashinflash.repay.io/)
        required: true
        default: https://cashinflash.repay.io/
      customer_portal_token:
        description: Customer Portal Token
        required: true
      ach_api_user:
        description: ACH REST API User (e.g. vergentAPI1073745649)
        required: true
      ach_secure_token:
        description: ACH Secure Token
        required: true
      ach_merchant_id:
        description: ACH Merchant ID (e.g. 1073745649)
        required: true

env:
  AWS_REGION: us-east-1
  SECRET_NAME: cif-portal/repay/credentials
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  store:
    runs-on: ubuntu-latest
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Mask sensitive inputs from any downstream log output
        env:
          GAU: ${{ github.event.inputs.gateway_api_user }}
          GST: ${{ github.event.inputs.gateway_secure_token }}
          CPT: ${{ github.event.inputs.customer_portal_token }}
          AAU: ${{ github.event.inputs.ach_api_user }}
          AST: ${{ github.event.inputs.ach_secure_token }}
        run: |
          echo "::add-mask::$GAU"
          echo "::add-mask::$GST"
          echo "::add-mask::$CPT"
          echo "::add-mask::$AAU"
          echo "::add-mask::$AST"

      - name: Build secret payload and store in Secrets Manager
        env:
          GATEWAY_API_USER: ${{ github.event.inputs.gateway_api_user }}
          GATEWAY_SECURE_TOKEN: ${{ github.event.inputs.gateway_secure_token }}
          GATEWAY_MERCHANT_ID: ${{ github.event.inputs.gateway_merchant_id }}
          CUSTOMER_PORTAL_URL: ${{ github.event.inputs.customer_portal_url }}
          CUSTOMER_PORTAL_TOKEN: ${{ github.event.inputs.customer_portal_token }}
          ACH_API_USER: ${{ github.event.inputs.ach_api_user }}
          ACH_SECURE_TOKEN: ${{ github.event.inputs.ach_secure_token }}
          ACH_MERCHANT_ID: ${{ github.event.inputs.ach_merchant_id }}
        run: |
          set -e
          # Assemble JSON with jq so no token ever interpolates into
          # a shell string (avoids accidental logging on shell errors).
          PAYLOAD=$(jq -n \
            --arg gau "$GATEWAY_API_USER" \
            --arg gst "$GATEWAY_SECURE_TOKEN" \
            --arg gmi "$GATEWAY_MERCHANT_ID" \
            --arg cpu "$CUSTOMER_PORTAL_URL" \
            --arg cpt "$CUSTOMER_PORTAL_TOKEN" \
            --arg aau "$ACH_API_USER" \
            --arg ast "$ACH_SECURE_TOKEN" \
            --arg ami "$ACH_MERCHANT_ID" \
            '{
              gatewayApiUser: $gau,
              gatewaySecureToken: $gst,
              gatewayMerchantId: $gmi,
              customerPortalUrl: $cpu,
              customerPortalToken: $cpt,
              achApiUser: $aau,
              achSecureToken: $ast,
              achMerchantId: $ami
            }')

          if aws secretsmanager describe-secret --secret-id "$SECRET_NAME" >/dev/null 2>&1; then
            aws secretsmanager put-secret-value \
              --secret-id "$SECRET_NAME" \
              --secret-string "$PAYLOAD" >/dev/null
            echo "Updated existing secret $SECRET_NAME"
          else
            aws secretsmanager create-secret \
              --name "$SECRET_NAME" \
              --description "Repay merchant credentials for the cif-portal payments Lambda" \
              --secret-string "$PAYLOAD" >/dev/null
            echo "Created secret $SECRET_NAME"
          fi

          ARN=$(aws secretsmanager describe-secret --secret-id "$SECRET_NAME" --query ARN --output text)
          echo "Secret ARN: $ARN"
          {
            echo "### Repay credentials stored"
            echo ""
            echo "- Secret name: \`$SECRET_NAME\`"
            echo "- Secret ARN: \`$ARN\`"
            echo ""
            echo "Next: in AWS IAM, grant \`secretsmanager:GetSecretValue\` on this ARN to the cif-portal-payments-dev Lambda execution role once we're ready to wire the Add Card flow."
          } >> "$GITHUB_STEP_SUMMARY"
