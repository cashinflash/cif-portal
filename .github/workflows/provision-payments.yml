name: Provision payments Lambda

# Runs on every push to the feature branches AND on manual dispatch.
# Creates the Lambda on first run, updates the code on subsequent
# runs, and reconciles any missing HttpApi routes. Fully idempotent:
# routes that already exist are skipped, and the Lambda code gets
# whatever's in the current commit's backend/handlers/ folder.
#
# Auto-running this on push means we never again ship a code change
# that references a route we haven't wired.

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - 'claude/**'
    paths:
      - 'backend/handlers/**'
      - '.github/workflows/provision-payments.yml'

env:
  AWS_REGION: us-east-1
  HTTP_API_ID: anh066l1wf
  AUTHORIZER_ID: ppc9vg
  FN: cif-portal-payments-dev
  # Path 1 (Repay RgAPI direct-charge) — ledger table + sandbox-by-default
  # hostname. Flip REPAY_API_HOSTNAME to api.repayonline.com when going live.
  PAYMENT_LEDGER_TABLE: cif-portal-payments-ledger-dev
  PAYMENT_METHODS_TABLE: cif-portal-customer-payment-methods-dev
  # Currently SANDBOX for Vergent reconcile body-shape iteration —
  # flip back to api.repayonline.com once Vergent's
  # PostCustomerLoanPayment accepts our body, then do a final
  # real-card prod test. Repay's duplicate-charge protection
  # blocks same-card-same-amount-same-day; sandbox lets us
  # iterate freely without burning real cards.
  REPAY_API_HOSTNAME: api.sandbox.repayonline.com
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  provision:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Package handlers
        run: |
          cd backend
          zip -qr /tmp/handlers.zip handlers -x "handlers/__pycache__/*" "*.pyc"

      - name: Create or update payments Lambda
        run: |
          set -e
          if aws lambda get-function --function-name "$FN" >/dev/null 2>&1; then
            # Lambda already exists — deploy.yml handles code updates on
            # every push. Skip the update here to avoid racing with it
            # (ResourceConflictException when both workflows fire on the
            # same commit). Routes + permissions are still reconciled
            # below, which is the whole point of re-running provision.
            echo "$FN already exists — leaving code to deploy.yml."
          else
            echo "$FN does not exist — creating from loans Lambda template."
            LOANS_CFG=$(aws lambda get-function-configuration --function-name cif-portal-loans-dev)
            ROLE=$(echo "$LOANS_CFG" | jq -r '.Role')
            ENV=$(echo "$LOANS_CFG" | jq -c '.Environment // {"Variables": {}}')
            LAYERS_ARGS=()
            LAYER_LIST=$(echo "$LOANS_CFG" | jq -r '(.Layers // []) | map(.Arn) | .[]')
            if [ -n "$LAYER_LIST" ]; then
              while IFS= read -r arn; do
                LAYERS_ARGS+=("$arn")
              done <<< "$LAYER_LIST"
            fi
            CREATE_ARGS=(
              --function-name "$FN"
              --runtime python3.12
              --architectures arm64
              --role "$ROLE"
              --handler handlers.payments.lambda_handler
              --zip-file fileb:///tmp/handlers.zip
              --environment "$ENV"
              --memory-size 256
              --timeout 15
            )
            if [ ${#LAYERS_ARGS[@]} -gt 0 ]; then
              CREATE_ARGS+=(--layers "${LAYERS_ARGS[@]}")
            fi
            aws lambda create-function "${CREATE_ARGS[@]}" --no-cli-pager >/dev/null
            aws lambda wait function-active --function-name "$FN"
            echo "$FN created."
          fi

      - name: Wire HttpApi routes
        run: |
          set -e
          FN_ARN=$(aws lambda get-function --function-name "$FN" --query 'Configuration.FunctionArn' --output text)
          ACCT=$(aws sts get-caller-identity --query Account --output text)
          echo "Lambda ARN: $FN_ARN"
          echo "API: $HTTP_API_ID  Authorizer: $AUTHORIZER_ID"

          # Reuse existing AWS_PROXY integration for this Lambda if present.
          INTEG_ID=$(aws apigatewayv2 get-integrations --api-id "$HTTP_API_ID" \
            --query "Items[?IntegrationUri=='$FN_ARN'].IntegrationId | [0]" \
            --output text 2>/dev/null || echo "")
          if [ -z "$INTEG_ID" ] || [ "$INTEG_ID" = "None" ]; then
            INTEG_ID=$(aws apigatewayv2 create-integration \
              --api-id "$HTTP_API_ID" \
              --integration-type AWS_PROXY \
              --integration-uri "$FN_ARN" \
              --payload-format-version 2.0 \
              --query IntegrationId --output text)
            echo "Created integration $INTEG_ID"
          else
            echo "Reusing integration $INTEG_ID"
          fi

          # Ensure each route exists; skip if already present.
          ROUTES=(
            "GET /api/my-cards"
            "POST /api/my-cards"
            "GET /api/my-banks"
            "POST /api/my-banks"
            "GET /api/my-payment/loan-summary"
            "POST /api/my-payment"
            "POST /api/my-payment/charge"
            "GET /api/my-payment-methods"
            "DELETE /api/my-payment-methods/{methodId}"
            "GET /api/my-payment-config"
          )
          for RK in "${ROUTES[@]}"; do
            # Query for all matching RouteIds. With --output text and
            # the projection `Items[?RouteKey=='X'].RouteId`, the CLI
            # returns each match on its own line (whitespace-separated)
            # — or nothing at all when no match. Earlier we used
            # `| [0]` to take the first, but AWS CLI's --output text
            # rendering of a single-string JMESPath result still emits
            # "None\nNone\nNone" patterns that fooled the -n check.
            # Plain Items[?].RouteId + head -n 1 is unambiguous: a
            # single real RouteId, or empty.
            EXISTING=$(aws apigatewayv2 get-routes --api-id "$HTTP_API_ID" \
              --query "Items[?RouteKey=='$RK'].RouteId" \
              --output text 2>/dev/null | tr -d '\t' | head -n 1)
            if [ -n "$EXISTING" ] && [ "$EXISTING" != "None" ]; then
              echo "Route '$RK' already exists ($EXISTING)"
              continue
            fi
            aws apigatewayv2 create-route \
              --api-id "$HTTP_API_ID" \
              --route-key "$RK" \
              --target "integrations/$INTEG_ID" \
              --authorization-type JWT \
              --authorizer-id "$AUTHORIZER_ID" \
              --no-cli-pager >/dev/null
            echo "Created route '$RK'"
          done

          # Grant HttpApi permission to invoke the Lambda (one broad statement).
          STMT_ID=apigateway-invoke-payments
          # Properly parse the policy doc — a grep on the raw string
          # has to match escaped quotes ("\"Sid\":...") which is fragile.
          EXISTING_SIDS=$(aws lambda get-policy --function-name "$FN" 2>/dev/null \
            | jq -r '.Policy | fromjson | .Statement[].Sid' 2>/dev/null \
            || true)
          if echo "$EXISTING_SIDS" | grep -qxF "$STMT_ID"; then
            echo "Lambda permission $STMT_ID already set."
          else
            aws lambda add-permission \
              --function-name "$FN" \
              --statement-id "$STMT_ID" \
              --action lambda:InvokeFunction \
              --principal apigateway.amazonaws.com \
              --source-arn "arn:aws:execute-api:$AWS_REGION:$ACCT:$HTTP_API_ID/*/*/*" \
              --no-cli-pager >/dev/null
            echo "Added invoke permission."
          fi

      - name: Provision payment-ledger DynamoDB table (Path 1 / RgAPI charge)
        run: |
          set -e
          if aws dynamodb describe-table --table-name "$PAYMENT_LEDGER_TABLE" >/dev/null 2>&1; then
            echo "Table $PAYMENT_LEDGER_TABLE already exists."
          else
            aws dynamodb create-table \
              --table-name "$PAYMENT_LEDGER_TABLE" \
              --attribute-definitions AttributeName=ledgerId,AttributeType=S \
              --key-schema AttributeName=ledgerId,KeyType=HASH \
              --billing-mode PAY_PER_REQUEST \
              --no-cli-pager >/dev/null
            echo "Created table $PAYMENT_LEDGER_TABLE — waiting for ACTIVE…"
            aws dynamodb wait table-exists --table-name "$PAYMENT_LEDGER_TABLE"
          fi

      - name: Provision payment-methods DynamoDB table (saved cards)
        run: |
          set -e
          if aws dynamodb describe-table --table-name "$PAYMENT_METHODS_TABLE" >/dev/null 2>&1; then
            echo "Table $PAYMENT_METHODS_TABLE already exists."
          else
            # Composite key: customerId (HASH) + methodId (RANGE).
            # Lets us query all methods for one customer with a
            # single Query call, no scan.
            aws dynamodb create-table \
              --table-name "$PAYMENT_METHODS_TABLE" \
              --attribute-definitions \
                AttributeName=customerId,AttributeType=S \
                AttributeName=methodId,AttributeType=S \
              --key-schema \
                AttributeName=customerId,KeyType=HASH \
                AttributeName=methodId,KeyType=RANGE \
              --billing-mode PAY_PER_REQUEST \
              --no-cli-pager >/dev/null
            echo "Created table $PAYMENT_METHODS_TABLE — waiting for ACTIVE…"
            aws dynamodb wait table-exists --table-name "$PAYMENT_METHODS_TABLE"
          fi

      - name: Grant Repay + OmniaPay secret reads to payments Lambda and set env
        run: |
          set -e
          REPAY_ARN=$(aws secretsmanager describe-secret \
            --secret-id cif-portal/repay/credentials \
            --query ARN --output text 2>/dev/null || echo "")
          REPAY_SANDBOX_ARN=$(aws secretsmanager describe-secret \
            --secret-id cif-portal/repay/sandbox-credentials \
            --query ARN --output text 2>/dev/null || echo "")
          OMNIAPAY_ARN=$(aws secretsmanager describe-secret \
            --secret-id cif-portal/omniapay/credentials \
            --query ARN --output text 2>/dev/null || echo "")

          # Repay grant — required for the legacy server-side
          # tokenization path (currently disabled but creds are kept).
          if [ -z "$REPAY_ARN" ] || [ "$REPAY_ARN" = "None" ]; then
            echo "::warning::Repay secret not yet created. Dispatch store-repay-secrets.yml, then re-run this workflow."
          else
            echo "Repay secret ARN: $REPAY_ARN"
          fi

          # OmniaPay grant — required for the active customer-self-service
          # Add Card flow (creates iframe sessions via api.omniapay.com).
          if [ -z "$OMNIAPAY_ARN" ] || [ "$OMNIAPAY_ARN" = "None" ]; then
            echo "::warning::OmniaPay secret not yet created. Store cif-portal/omniapay/credentials in AWS Secrets Manager, then re-run this workflow."
          else
            echo "OmniaPay secret ARN: $OMNIAPAY_ARN"
          fi

          if [ -z "$REPAY_ARN$REPAY_SANDBOX_ARN$OMNIAPAY_ARN" ] || \
             { [ "$REPAY_ARN" = "None" ] && [ "$REPAY_SANDBOX_ARN" = "None" ] && [ "$OMNIAPAY_ARN" = "None" ]; }; then
            echo "::warning::No payment-vendor secrets present yet — skipping IAM grant."
            exit 0
          fi

          ROLE_ARN=$(aws lambda get-function-configuration \
            --function-name "$FN" --query 'Role' --output text)
          ROLE_NAME=$(echo "$ROLE_ARN" | awk -F/ '{print $NF}')
          echo "Lambda role: $ROLE_NAME"

          # Build the Resource list: only include ARNs that exist.
          RESOURCE_LIST="["
          SEP=""
          if [ -n "$REPAY_ARN" ] && [ "$REPAY_ARN" != "None" ]; then
            RESOURCE_LIST="$RESOURCE_LIST$SEP\"$REPAY_ARN\""
            SEP=","
          fi
          if [ -n "$REPAY_SANDBOX_ARN" ] && [ "$REPAY_SANDBOX_ARN" != "None" ]; then
            RESOURCE_LIST="$RESOURCE_LIST$SEP\"$REPAY_SANDBOX_ARN\""
            SEP=","
          fi
          if [ -n "$OMNIAPAY_ARN" ] && [ "$OMNIAPAY_ARN" != "None" ]; then
            RESOURCE_LIST="$RESOURCE_LIST$SEP\"$OMNIAPAY_ARN\""
            SEP=","
          fi
          RESOURCE_LIST="$RESOURCE_LIST]"

          aws iam put-role-policy \
            --role-name "$ROLE_NAME" \
            --policy-name payments-read-vendor-secrets \
            --policy-document "{\"Version\":\"2012-10-17\",\"Statement\":[{\"Effect\":\"Allow\",\"Action\":\"secretsmanager:GetSecretValue\",\"Resource\":$RESOURCE_LIST}]}"
          echo "IAM policy payments-read-vendor-secrets attached."

          # Phase 3 — let payments read the impersonations table so
          # X-Impersonation-Token requests resolve to the target
          # customer instead of falling back to the operator's
          # admin JWT (which would expose the wrong card data).
          # Same table the loans Lambda owns; we only need GetItem.
          ACCT=$(aws sts get-caller-identity --query Account --output text)
          IMPERSONATIONS_TABLE_ARN="arn:aws:dynamodb:$AWS_REGION:$ACCT:table/cif-portal-impersonations-dev"
          aws iam put-role-policy \
            --role-name "$ROLE_NAME" \
            --policy-name payments-impersonations-read \
            --policy-document "{\"Version\":\"2012-10-17\",\"Statement\":[{\"Effect\":\"Allow\",\"Action\":\"dynamodb:GetItem\",\"Resource\":\"$IMPERSONATIONS_TABLE_ARN\"}]}"
          echo "IAM policy payments-impersonations-read attached."

          # Path 1 — payment-ledger table (every Repay charge writes one row).
          LEDGER_TABLE_ARN="arn:aws:dynamodb:$AWS_REGION:$ACCT:table/$PAYMENT_LEDGER_TABLE"
          aws iam put-role-policy \
            --role-name "$ROLE_NAME" \
            --policy-name payments-ledger-write \
            --policy-document "{\"Version\":\"2012-10-17\",\"Statement\":[{\"Effect\":\"Allow\",\"Action\":[\"dynamodb:PutItem\",\"dynamodb:GetItem\",\"dynamodb:Query\",\"dynamodb:UpdateItem\"],\"Resource\":\"$LEDGER_TABLE_ARN\"}]}"
          echo "IAM policy payments-ledger-write attached."

          # Saved-cards table (PutItem on charge success, GetItem +
          # Query for the list + delete endpoints).
          METHODS_TABLE_ARN="arn:aws:dynamodb:$AWS_REGION:$ACCT:table/$PAYMENT_METHODS_TABLE"
          aws iam put-role-policy \
            --role-name "$ROLE_NAME" \
            --policy-name payments-methods-readwrite \
            --policy-document "{\"Version\":\"2012-10-17\",\"Statement\":[{\"Effect\":\"Allow\",\"Action\":[\"dynamodb:PutItem\",\"dynamodb:GetItem\",\"dynamodb:Query\",\"dynamodb:DeleteItem\"],\"Resource\":\"$METHODS_TABLE_ARN\"}]}"
          echo "IAM policy payments-methods-readwrite attached."

          # Drop the older single-secret policy if present (cleanup).
          aws iam delete-role-policy \
            --role-name "$ROLE_NAME" \
            --policy-name payments-read-repay-secret \
            --no-cli-pager 2>/dev/null || true

          # Set REPAY_SECRET_ARN + OMNIAPAY_SECRET_ARN on the Lambda so
          # the handler knows which secrets to read. Preserve any
          # existing env vars.
          EXISTING_ENV=$(aws lambda get-function-configuration \
            --function-name "$FN" \
            --query 'Environment.Variables' --output json 2>/dev/null)
          if [ "$EXISTING_ENV" = "null" ] || [ -z "$EXISTING_ENV" ]; then
            EXISTING_ENV='{}'
          fi
          NEW_ENV="$EXISTING_ENV"
          if [ -n "$REPAY_ARN" ] && [ "$REPAY_ARN" != "None" ]; then
            NEW_ENV=$(echo "$NEW_ENV" | jq --arg v "$REPAY_ARN" '. + {REPAY_SECRET_ARN: $v}')
          fi
          if [ -n "$REPAY_SANDBOX_ARN" ] && [ "$REPAY_SANDBOX_ARN" != "None" ]; then
            NEW_ENV=$(echo "$NEW_ENV" | jq --arg v "$REPAY_SANDBOX_ARN" '. + {REPAY_SANDBOX_SECRET_ARN: $v}')
          fi
          if [ -n "$OMNIAPAY_ARN" ] && [ "$OMNIAPAY_ARN" != "None" ]; then
            NEW_ENV=$(echo "$NEW_ENV" | jq --arg v "$OMNIAPAY_ARN" '. + {OMNIAPAY_SECRET_ARN: $v}')
          fi
          # Phase 3 — point payments at the same impersonations
          # table the loans Lambda uses (provisioned by
          # provision-loans.yml). Defaulted in the handler too,
          # but explicit env keeps cross-stage configurability.
          NEW_ENV=$(echo "$NEW_ENV" | jq '. + {IMPERSONATIONS_TABLE: "cif-portal-impersonations-dev"}')
          # Path 1 — wire the ledger table + Repay sandbox hostname.
          # Flip REPAY_API_HOSTNAME at the top of this workflow when
          # going to prod.
          NEW_ENV=$(echo "$NEW_ENV" | jq --arg t "$PAYMENT_LEDGER_TABLE" '. + {PAYMENT_LEDGER_TABLE: $t}')
          NEW_ENV=$(echo "$NEW_ENV" | jq --arg t "$PAYMENT_METHODS_TABLE" '. + {PAYMENT_METHODS_TABLE: $t}')
          NEW_ENV=$(echo "$NEW_ENV" | jq --arg h "$REPAY_API_HOSTNAME" '. + {REPAY_API_HOSTNAME: $h}')
          aws lambda update-function-configuration \
            --function-name "$FN" \
            --environment "{\"Variables\": $NEW_ENV}" \
            --no-cli-pager >/dev/null
          aws lambda wait function-updated --function-name "$FN"
          echo "Lambda env vars updated."

      - name: Summary
        if: always()
        run: |
          {
            echo "### Payments provisioning"
            echo ""
            echo "- Lambda: $FN"
            echo "- Routes:"
            echo "  - GET /api/my-cards"
            echo "  - POST /api/my-cards"
            echo "  - GET /api/my-banks"
            echo "  - GET /api/my-payment/loan-summary"
            echo "  - POST /api/my-payment"
            echo "  - GET /api/my-payment-config"
          } >> "$GITHUB_STEP_SUMMARY"
