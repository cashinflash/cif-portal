name: Provision Auth — Signup via Resend

# Grants the auth-mfa Lambda role cognito-idp:AdminCreateUser (it already
# has AdminSetUserPassword / AdminUpdateUserAttributes / AdminGetUser) and
# creates the two unauthenticated HttpApi routes for the server-side signup
# flow that delivers the confirmation code through Resend:
#   POST /api/auth/signup/start
#   POST /api/auth/signup/confirm
#
# Auto-runs on push when this file changes (path-filtered); also runnable
# from the Actions tab. Idempotent.

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - 'claude/**'
    paths:
      - '.github/workflows/provision-auth-signup.yml'

env:
  AWS_REGION: us-east-1
  HTTP_API_ID: anh066l1wf
  FN: cif-portal-auth-mfa-dev
  COGNITO_USER_POOL_ID: us-east-1_U508xOs95

jobs:
  provision:
    runs-on: ubuntu-latest
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Grant AdminCreateUser to auth-mfa role
        run: |
          set -e
          ACCT=$(aws sts get-caller-identity --query Account --output text)
          USER_POOL_ARN="arn:aws:cognito-idp:$AWS_REGION:$ACCT:userpool/$COGNITO_USER_POOL_ID"
          ROLE_ARN=$(aws lambda get-function-configuration \
            --function-name "$FN" --query 'Role' --output text)
          ROLE_NAME="${ROLE_ARN##*/}"
          POLICY_DOC=$(cat <<EOF
          {
            "Version": "2012-10-17",
            "Statement": [
              {
                "Sid": "SignupAdminCreate",
                "Effect": "Allow",
                "Action": [
                  "cognito-idp:AdminCreateUser",
                  "cognito-idp:AdminSetUserPassword",
                  "cognito-idp:AdminUpdateUserAttributes",
                  "cognito-idp:AdminGetUser"
                ],
                "Resource": "$USER_POOL_ARN"
              }
            ]
          }
          EOF
          )
          aws iam put-role-policy \
            --role-name "$ROLE_NAME" \
            --policy-name auth-mfa-signup \
            --policy-document "$POLICY_DOC" \
            --no-cli-pager
          echo "Inline policy auth-mfa-signup attached to $ROLE_NAME."

      - name: Wire HttpApi routes (unauthenticated)
        run: |
          set -e
          FN_ARN=$(aws lambda get-function --function-name "$FN" \
            --query 'Configuration.FunctionArn' --output text)
          INTEG_ID=$(aws apigatewayv2 get-integrations --api-id "$HTTP_API_ID" \
            --query "Items[?IntegrationUri=='$FN_ARN'].IntegrationId | [0]" \
            --output text 2>/dev/null || echo "")
          if [ -z "$INTEG_ID" ] || [ "$INTEG_ID" = "None" ]; then
            INTEG_ID=$(aws apigatewayv2 create-integration \
              --api-id "$HTTP_API_ID" --integration-type AWS_PROXY \
              --integration-uri "$FN_ARN" --payload-format-version 2.0 \
              --query IntegrationId --output text)
            echo "Created integration $INTEG_ID"
          else
            echo "Reusing integration $INTEG_ID"
          fi

          ROUTES=(
            "POST /api/auth/signup/start"
            "POST /api/auth/signup/confirm"
            "OPTIONS /api/auth/signup/start"
            "OPTIONS /api/auth/signup/confirm"
          )
          for RK in "${ROUTES[@]}"; do
            # Whitespace-safe create-or-update (filters literal "None").
            RID=$(aws apigatewayv2 get-routes --api-id "$HTTP_API_ID" \
              --query "Items[?RouteKey=='$RK'].RouteId" --output text 2>/dev/null \
              | tr '\t' '\n' | grep -viE '^(none)?$' | head -n1)
            if [ -n "$RID" ]; then
              aws apigatewayv2 update-route --api-id "$HTTP_API_ID" \
                --route-id "$RID" --target "integrations/$INTEG_ID" \
                --authorization-type NONE --no-cli-pager >/dev/null
              echo "Ensured route '$RK' ($RID)"
            else
              aws apigatewayv2 create-route --api-id "$HTTP_API_ID" \
                --route-key "$RK" --target "integrations/$INTEG_ID" \
                --authorization-type NONE --no-cli-pager >/dev/null
              echo "Created route '$RK'"
            fi
          done

          STMT_ID=apigateway-invoke-auth-signup
          ACCT=$(aws sts get-caller-identity --query Account --output text)
          EXISTING_SIDS=$(aws lambda get-policy --function-name "$FN" 2>/dev/null \
            | jq -r '.Policy | fromjson | .Statement[].Sid' 2>/dev/null || true)
          if echo "$EXISTING_SIDS" | grep -qxF "$STMT_ID"; then
            echo "Invoke permission $STMT_ID already present"
          else
            aws lambda add-permission --function-name "$FN" \
              --statement-id "$STMT_ID" --action lambda:InvokeFunction \
              --principal apigateway.amazonaws.com \
              --source-arn "arn:aws:execute-api:$AWS_REGION:$ACCT:$HTTP_API_ID/*/*/api/auth/signup/*" \
              --no-cli-pager
            echo "Added invoke permission $STMT_ID"
          fi

      - name: Summary
        if: always()
        run: |
          {
            echo "### Auth signup-via-Resend provisioning"
            echo ""
            echo "- Lambda: \`$FN\`"
            echo "- IAM: \`AdminCreateUser\` (+ SetUserPassword / UpdateUserAttributes / GetUser)"
            echo "- Routes (auth NONE): \`POST /api/auth/signup/start\`, \`POST /api/auth/signup/confirm\`"
          } >> "$GITHUB_STEP_SUMMARY"
