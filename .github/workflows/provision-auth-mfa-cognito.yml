name: Provision auth-mfa Cognito grants

# Grants the auth-mfa Lambda role the additional Cognito permissions
# it needs for the login-time email-sync fallback (Phase H follow-up):
#
#   cognito-idp:ListUsers              — find a Cognito user by their
#                                          custom:vergentCustomerId attribute
#   cognito-idp:AdminUpdateUserAttributes — update the email attribute
#                                          when admin has changed it in
#                                          Vergent and the customer tries
#                                          to log in with the new email
#
# Idempotent — re-running the workflow just refreshes the inline policy.
#
# Auto-fires on push when this workflow file changes (path-filtered).

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - 'claude/**'
    paths:
      - '.github/workflows/provision-auth-mfa-cognito.yml'

env:
  AWS_REGION: us-east-1
  FN: cif-portal-auth-mfa-dev
  COGNITO_USER_POOL_ID: us-east-1_U508xOs95

jobs:
  provision:
    runs-on: ubuntu-latest
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Grant Cognito sync permissions to auth-mfa role
        run: |
          set -e
          ACCT=$(aws sts get-caller-identity --query Account --output text)
          USER_POOL_ARN="arn:aws:cognito-idp:$AWS_REGION:$ACCT:userpool/$COGNITO_USER_POOL_ID"

          ROLE_ARN=$(aws lambda get-function-configuration \
            --function-name "$FN" --query 'Role' --output text)
          ROLE_NAME="${ROLE_ARN##*/}"

          POLICY_NAME=auth-mfa-cognito-email-sync
          POLICY_DOC=$(cat <<EOF
          {
            "Version": "2012-10-17",
            "Statement": [
              {
                "Sid": "ListUsersForVergentLookup",
                "Effect": "Allow",
                "Action": "cognito-idp:ListUsers",
                "Resource": "$USER_POOL_ARN"
              },
              {
                "Sid": "UpdateEmailOnSync",
                "Effect": "Allow",
                "Action": [
                  "cognito-idp:AdminUpdateUserAttributes",
                  "cognito-idp:AdminGetUser"
                ],
                "Resource": "$USER_POOL_ARN"
              }
            ]
          }
          EOF
          )
          aws iam put-role-policy \
            --role-name "$ROLE_NAME" \
            --policy-name "$POLICY_NAME" \
            --policy-document "$POLICY_DOC" \
            --no-cli-pager
          echo "Inline policy $POLICY_NAME attached to $ROLE_NAME."

      - name: Summary
        if: always()
        run: |
          {
            echo "### auth-mfa Cognito grants"
            echo ""
            echo "- Lambda: \`$FN\`"
            echo "- User pool: \`$COGNITO_USER_POOL_ID\`"
            echo "- Inline policy: \`auth-mfa-cognito-email-sync\`"
            echo "- Actions: \`cognito-idp:ListUsers\`, \`cognito-idp:AdminUpdateUserAttributes\`, \`cognito-idp:AdminGetUser\`"
          } >> "$GITHUB_STEP_SUMMARY"
